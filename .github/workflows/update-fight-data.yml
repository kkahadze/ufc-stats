name: Update Fight Data

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fight-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore Scrape Cache
        id: scrape-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/ufc-stats
          key: ${{ runner.os }}-ufc-stats-scrape-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ufc-stats-scrape-

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh Fight Data
        run: python scripts/update_fight_data.py

      - name: Save Scrape Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/ufc-stats
          key: ${{ steps.scrape-cache-restore.outputs.cache-primary-key }}

      - name: Detect Data Changes
        id: detect-changes
        run: |
          if git diff --quiet -- docs/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Updated Data
        if: steps.detect-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "chore: refresh UFC fight data"
          git push
